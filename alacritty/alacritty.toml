[general]
import = [
  # "~/.config/alacritty/themes/monochrome.toml",
  # "~/.config/alacritty/themes/nord.toml"
  "~/.config/alacritty/themes/tokyo-night.toml"
]

[env]
# Fcitx Config
GTK_IM_MODULE = "fcitx"
QT_IM_MODULE = "fcitx"
XMODIFIERS = "@im=fcitx"

[terminal]
osc52 = "copypaste"

[terminal.shell]
program = "tmux"
args = ["new-session", "-A", "-s", "main"]

[window]
# padding = { x = 8, y = 8 }
# position = { x = 0, y = 0 }
dimensions = { columns = 140, lines = 35 }
dynamic_padding = true
decorations = "Full"
decorations_theme_variant = "Dark"
startup_mode = "Windowed"
title = "Terminal - ppQwQqq"
class = { instance = "Alacritty", general = "Alacritty" }
opacity = 0.92

[scrolling]
history = 50000
multiplier = 3

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
bold = { family = "FiraCode Nerd Font", style = "Bold" }
italic = { family = "FiraCode Nerd Font", style = "Italic" }
bold_italic = { family = "FiraCode Nerd Font", style = "Bold Italic" }
size = 12.0
offset = { x = 0, y = 1 }
glyph_offset = { x = 0, y = 0 }
builtin_box_drawing = true

[cursor]
style = { shape = "Block", blinking = "Off" }
thickness = 0.15
blink_interval = 750
unfocused_hollow = true
blink_timeout = 0

[cursor.vi_mode_style]
shape = "Beam"
blinking = "Off"

# Keybindings' Config

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Middle"
action = "PasteSelection"

[[mouse.bindings]]
mouse = "Right"
action = "ExpandSelection"

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "L"
mods = "Control"
action = "ToggleFullscreen"

[[keyboard.bindings]]
key = "F"
mods = "Control|Shift"
action = "SearchForward"

[[keyboard.bindings]]
key = "B"
mods = "Control|Shift"
action = "SearchBackward"

[[keyboard.bindings]]
key = "Up"
mods = "Shift"
action = "ScrollLineUp"

[[keyboard.bindings]]
key = "Down"
mods = "Shift"
action = "ScrollLineDown"

[[keyboard.bindings]]
key = "PageUp"
mods = "Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key = "PageDown"
mods = "Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "Q"
mods = "Control|Shift"
action = "Quit"

[debug]
render_timer = false
persistent_logging = false
log_level = "Warn"
