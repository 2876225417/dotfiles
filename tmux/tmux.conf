# Basic Config
set -g prefix C-x
unbind C-b
bind C-x send-prefix

# Enable Mouse
set -g mouse on

# Set as the default terminal
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' 'set -g default-terminal "tmux-256color"' 'set -g default-terminal "screen-256color"'
set -ga terminal-overrides ",*256col*:Tc"
set-window-option -g allow-passthrough on

# Start window number from 0
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# Shortcut
## Tag
bind t new-window -c "#{pane_current_path}"
bind w confirm-before -p "Kill window #W? (y/n)" kill-window
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n C-M-q previous-window
bind -n C-M-e next-window

## Pagination (nvim style: prefix s h → :split top/bottom, prefix s v → :vsplit left/right)
bind s switch-client -T split-mode
bind -T split-mode h split-window -v -c "#{pane_current_path}" \; switch-client -T prefix
bind -T split-mode v split-window -h -c "#{pane_current_path}" \; switch-client -T prefix
bind -T split-mode Escape switch-client -T prefix
bind -T split-mode C-c     switch-client -T prefix
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind z resize-pane -Z

## Resize Pane (nvim style: prefix then Ctrl+Arrow)
unbind -n C-Left
unbind -n C-Down
unbind -n C-Up
unbind -n C-Right
bind C-Left  resize-pane -L 5
bind C-Down  resize-pane -D 5
bind C-Up    resize-pane -U 5
bind C-Right resize-pane -R 5

## Switch Page
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ===== Copy Mode Vi Keybindings (Matches Neovim habits) =====
## Visual Selection (nvim: v / V / Ctrl-v)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

## Yank/Copy (nvim: y / Y / Ctrl-c → system clipboard)
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line
bind -T copy-mode-vi C-c send-keys -X copy-selection-and-cancel

## Cursor line jump (nvim: H→^  L→$)
bind -T copy-mode-vi H send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line

## Quick scroll (nvim: C-j→5<C-e>  C-k→5<C-y>)
bind -T copy-mode-vi C-j send-keys -X scroll-down
bind -T copy-mode-vi C-k send-keys -X scroll-up

## Half page scroll (nvim: C-d / C-u)
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-u send-keys -X halfpage-up

## Search (nvim: / ? * # n N — matches nvim incremental search exactly)
bind -T copy-mode-vi / send-keys -X search-forward-incremental
bind -T copy-mode-vi ? send-keys -X search-backward-incremental
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse

# Reload Config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Status Bar Config
set -g status on
set -g status-interval 1
set -g status-position top
set -g status-justify left

# Status Bar Length
set -g status-left-length 120
set -g status-right-length 120

# ===== Color Theme Config - Catppuccin =====
## Status Bar Background Color (darker than terminal for visual separation)
set -g status-bg '#181825'
set -g status-fg '#cdd6f4'

## Left Side Status Bar - Session Info
set -g status-left '#[fg=#1e1e2e,bg=#cba6f7,bold] #S #[fg=#cba6f7,bg=#45475a]#[fg=#cdd6f4,bg=#45475a] #(~/.tmux/scripts/system_info.sh) #[fg=#45475a,bg=#313244]#[fg=#cdd6f4,bg=#313244] #(whoami)@#h #[fg=#313244,bg=#181825]'

set -g status-right '#[fg=#89b4fa,bg=#45475a]#[fg=#1e1e2e,bg=#89b4fa] #(~/.tmux/scripts/cpu_info.sh) #[fg=#74c7ec,bg=#89b4fa]#[fg=#1e1e2e,bg=#74c7ec] #(~/.tmux/scripts/memory_info.sh) #[fg=#a6e3a1,bg=#74c7ec]#[fg=#1e1e2e,bg=#a6e3a1] #(~/.tmux/scripts/disk_info.sh) #[fg=#fab387,bg=#a6e3a1]#[fg=#1e1e2e,bg=#fab387] #(~/.tmux/scripts/network_info.sh) #[fg=#cba6f7,bg=#fab387]#[fg=#1e1e2e,bg=#cba6f7] %H:%M %d %b'

# Window Status Style
## Current Window
setw -g window-status-current-style 'fg=#1e1e2e bg=#89b4fa bold'
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa] #I #W#{?window_zoomed_flag, 󰍉,} #[fg=#89b4fa,bg=#1e1e2e]'

## Non-current Window
setw -g window-status-style 'fg=#cdd6f4 bg=#45475a'
setw -g window-status-format '#[fg=#1e1e2e,bg=#45475a]#[fg=#cdd6f4,bg=#45475a] #I #W #[fg=#45475a,bg=#1e1e2e]'

## Window Division
setw -g window-status-separator ""

## Window Border (also acts as separator below status bar)
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

## Message Style
set -g message-style 'fg=#1e1e2e bg=#f9e2af'
set -g message-command-style 'fg=#1e1e2e bg=#f9e2af'

# Other Styles
set -g mode-keys vi
## Mode Style
setw -g mode-style 'fg=#1e1e2e bg=#cba6f7'

## Window Color Style
setw -g clock-mode-colour '#89b4fa'
setw -g clock-mode-style 24

# Plugin Config
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'alexwforsythe/tmux-which-key'

# tmux-which-key (which-key.nvim style popup menu on prefix)
set -g @which-key-popup-format 'fg=#cdd6f4,bg=#1e1e2e'
set -g @which-key-separator ' → '

# tmux-resurrect
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-bash-history 'off'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'

# tmux-yank
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'

# tmux-prefix-highlight
set -g @prefix_highlight_fg '#1e1e2e'
set -g @prefix_highlight_bg '#cba6f7'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#1e1e2e,bg=#f9e2af,bold'

# tmux-fzf
set -g @tmux-fzf-launch-key 'F'

# tmux-better-mouse-mode
set -g @scroll-speed-num-lines-per-scroll 3
set -g @scroll-without-changing-pane 'on'
set -g @scroll-in-moused-over-pane 'on'

# Unbind default Space to let tmux-which-key use it
unbind -T prefix Space

# Start network speed daemon (once, avoids self-match with [n] trick)
if-shell '! pgrep -f "[n]etwork_speed_daemon" >/dev/null' 'run-shell "~/.tmux/scripts/network_speed_daemon.sh &"'

# Init Plugin Manager
run '~/.tmux/plugins/tpm/tpm'


